<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emergency Blood Request</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="logo">BloodConnect</div>
    <a href="index.html">Home</a>
    <a href="find.html">Find Donor</a>
    <a href="register.html">Become Donor</a>
    <a href="emergency.html">Emergency</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact Us</a>
   
</nav>

<section class="emergency-hero">

    <div class="emergency-content">
        <h1>🚨 Emergency Blood Request</h1>

        <p>
            Quickly request blood during emergencies and
            connect with nearby donors.
        </p>
    </div>

    <div class="emergency-image">
        <img src="emergency.png.jpeg" alt="Emergency Blood Request">
    </div>

</section>

<section class="emergency-form">

    <h2>Request Blood</h2>

    <input type="text" id="patientName" placeholder="Patient Name">

<input type="text" id="bloodGroup" placeholder="Required Blood Group">

<input type="text" id="hospital" placeholder="Hospital Name">

<input type="text" id="city" placeholder="City">

<input type="text" id="contact" placeholder="Contact Number">

<textarea id="info" placeholder="Additional Information"></textarea>

<div class="btn-group">
    <button onclick="submitRequest()">Submit Request</button>

    <button type="button" onclick="clearForm()" class="clear-btn">
        Clear Form
    </button>
</div>
</div>
</div>


<p id="successMsg"></p>

</section>

<script src="script.js">

</script>

</body>
